appId: com.gonson.desktopcockroach
productName: DesktopCockroach
artifactName: ${productName}-${os}-${arch}.${ext} # 固定文件名（不带版本号），供 latest 直链
directories:
  output: release
files:
  - out/**/*
  - package.json
mac:
  identity: '-' # ad-hoc 自签名，避免 Apple Silicon 上「已损坏」误报
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  category: public.app-category.entertainment
win:
  target:
    - nsis
    - zip
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
