name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch: # 也支持手动触发（不会上传 Release）

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            script: pack:mac
            artifact: release/*.dmg
          - os: windows-latest
            script: pack:win
            artifact: |
              release/*.exe
              release/*.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Build installer
        run: npm run ${{ matrix.script }}
      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
